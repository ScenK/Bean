<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">How Bean is built</title>
  <desc id="desc">Architecture of Bean: three surfaces (desktop app, Discord, Teams) all call into one pure core package, which reaches out to OpenAI, coding agents, the user's Mac, and the ~/.bean file store. A scheduler drives routines through the same core.</desc>
  <defs>
    <style>
      .bg { fill: #f7f5ef; }
      .title { font: 800 30px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #202327; }
      .subtitle { font: 500 15px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #5c6168; }
      .col { font: 800 13px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; letter-spacing: .6px; fill: #808790; }
      .box-title { font: 800 17px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #1f252d; }
      .pkg { font: 700 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #79808a; }
      .box-text { font: 500 12.5px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #48515d; }
      .core-title { font: 800 22px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #6a5200; }
      .core-text { font: 600 13px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #5f5324; }
      .chip { font: 700 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #4a4222; }
      .foot { font: 500 12.5px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #5f6670; }
      .box-ui { fill: #edf7f6; stroke: #79b5ad; stroke-width: 1.4; }
      .box-core { fill: #fff6df; stroke: #d6a744; stroke-width: 1.8; }
      .box-out { fill: #eef1f4; stroke: #9aa4ae; stroke-width: 1.4; }
      .box-store { fill: #f9edf2; stroke: #cb7b99; stroke-width: 1.4; }
      .chip-bg { fill: #ffffff; stroke: #e2c983; stroke-width: 1.2; }
      .arrow { fill: none; stroke: #59616c; stroke-width: 2.2; marker-end: url(#arrow); }
      .arrow-out { fill: none; stroke: #246b63; stroke-width: 2.2; marker-end: url(#arrow-out); }
      .arrow-soft { fill: none; stroke: #9aa4ae; stroke-width: 1.8; stroke-dasharray: 5 6; marker-end: url(#arrow-soft); }
      .shadow { filter: url(#shadow); }
    </style>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity=".09"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#59616c"/>
    </marker>
    <marker id="arrow-out" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#246b63"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa4ae"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760"/>

  <text x="60" y="58" class="title">How Bean is built</text>
  <text x="60" y="86" class="subtitle">Three surfaces, one pure core. Every way you reach Bean — the desktop pet, a Discord bot, a Teams bot, the scheduler that runs your routines — </text>
  <text x="60" y="107" class="subtitle">funnels into the same Electron-free brain.</text>

  <!-- column captions -->
  <text x="60" y="146" class="col">SURFACES — how you reach it</text>
  <text x="470" y="146" class="col">CORE — the shared brain</text>
  <text x="900" y="146" class="col">REACH — what it drives</text>

  <!-- SURFACES -->
  <g class="shadow">
    <rect x="60" y="170" width="300" height="92" rx="12" class="box-ui"/>
    <rect x="60" y="288" width="300" height="80" rx="12" class="box-ui"/>
    <rect x="60" y="394" width="300" height="80" rx="12" class="box-ui"/>
    <rect x="60" y="520" width="300" height="92" rx="12" class="box-ui"/>
  </g>

  <text x="84" y="202" class="box-title">Desktop pet</text>
  <text x="270" y="202" class="pkg" text-anchor="end">@bean/app</text>
  <text x="84" y="226" class="box-text">Always-on-top avatar. Hover, click for</text>
  <text x="84" y="245" class="box-text">petals, drop a URL. Electron shell.</text>

  <text x="84" y="318" class="box-title">Discord bot</text>
  <text x="340" y="318" class="pkg" text-anchor="end">@bean/discord</text>
  <text x="84" y="345" class="box-text">Message Bean from a server or DM.</text>

  <text x="84" y="424" class="box-title">Teams bot</text>
  <text x="340" y="424" class="pkg" text-anchor="end">@bean/teams</text>
  <text x="84" y="451" class="box-text">Message Bean from your work chat.</text>

  <text x="84" y="552" class="box-title">Scheduler</text>
  <text x="340" y="552" class="pkg" text-anchor="end">cron + routine-runner</text>
  <text x="84" y="576" class="box-text">Fires routines on a cron schedule and</text>
  <text x="84" y="595" class="box-text">drains to-do queues — no human needed.</text>

  <!-- CORE -->
  <g class="shadow">
    <rect x="440" y="170" width="320" height="442" rx="16" class="box-core"/>
  </g>
  <text x="600" y="212" class="core-title" text-anchor="middle">@bean/core</text>
  <text x="600" y="236" class="core-text" text-anchor="middle">Pure ESM · zero Electron · dependency-injected</text>

  <g class="shadow">
    <rect x="468" y="262" width="264" height="40" rx="9" class="chip-bg"/>
    <rect x="468" y="312" width="264" height="40" rx="9" class="chip-bg"/>
    <rect x="468" y="362" width="264" height="40" rx="9" class="chip-bg"/>
    <rect x="468" y="412" width="264" height="40" rx="9" class="chip-bg"/>
    <rect x="468" y="462" width="264" height="40" rx="9" class="chip-bg"/>
    <rect x="468" y="512" width="264" height="40" rx="9" class="chip-bg"/>
  </g>
  <text x="600" y="287" class="chip" text-anchor="middle">converse() — chat, propose a run</text>
  <text x="600" y="337" class="chip" text-anchor="middle">launcher + delegate — hand off tasks</text>
  <text x="600" y="387" class="chip" text-anchor="middle">routines — schedule &amp; pipeline steps</text>
  <text x="600" y="437" class="chip" text-anchor="middle">memory · notes · todos</text>
  <text x="600" y="487" class="chip" text-anchor="middle">system-control — drive the Mac</text>
  <text x="600" y="537" class="chip" text-anchor="middle">skills · projects · persona loaders</text>

  <text x="600" y="588" class="core-text" text-anchor="middle">One brain, shared by every surface.</text>

  <!-- REACH -->
  <g class="shadow">
    <rect x="840" y="170" width="300" height="80" rx="12" class="box-out"/>
    <rect x="840" y="276" width="300" height="80" rx="12" class="box-out"/>
    <rect x="840" y="382" width="300" height="80" rx="12" class="box-out"/>
    <rect x="840" y="520" width="300" height="92" rx="12" class="box-store"/>
  </g>

  <text x="864" y="202" class="box-title">OpenAI</text>
  <text x="864" y="229" class="box-text">Your key, your model (BYOK).</text>

  <text x="864" y="308" class="box-title">Coding agents</text>
  <text x="864" y="335" class="box-text">opencode / claude, in Terminal or headless.</text>

  <text x="864" y="414" class="box-title">Your Mac</text>
  <text x="864" y="441" class="box-text">Volume, media, launch/quit apps (opt-in).</text>

  <text x="864" y="552" class="box-title">~/.bean store</text>
  <text x="864" y="579" class="box-text">Skills/*.md · JSON files, </text>
  <text x="864" y="598" class="box-text">plus SQLite FTS5 for Memory/Notes.</text>

  <!-- surface -> core -->
  <path class="arrow" d="M 360 216 C 400 216, 405 300, 440 320"/>
  <path class="arrow" d="M 360 328 C 400 328, 405 350, 440 360"/>
  <path class="arrow" d="M 360 434 C 400 434, 405 400, 440 392"/>
  <path class="arrow" d="M 360 566 C 400 566, 405 470, 440 430"/>

  <!-- core -> reach -->
  <path class="arrow-out" d="M 760 300 C 800 300, 805 210, 840 210"/>
  <path class="arrow-out" d="M 760 340 C 800 340, 805 316, 840 316"/>
  <path class="arrow-out" d="M 760 490 C 800 490, 805 422, 840 422"/>
  <path class="arrow-soft" d="M 760 540 C 800 540, 805 560, 840 560"/>

  <!-- footer -->
  <g class="shadow">
    <rect x="60" y="656" width="1080" height="66" rx="12" fill="#ffffff" stroke="#d2cdc1"/>
  </g>
  <text x="84" y="684" class="foot">The split is the point: all IO and routing logic lives in @bean/core as pure, testable functions. The surfaces (app / discord / teams) are thin — they</text>
  <text x="84" y="704" class="foot">wire OS access to core and render results. Add a new surface without touching the brain; add a new skill by dropping a markdown file into ~/.bean/skills.</text>
</svg>
