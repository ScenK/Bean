name: Mac installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # gh release create needs write access; default token is read-only

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test && pnpm typecheck
      - run: pnpm dist:mac
        env:
          # ponytail: unsigned build; add CSC_LINK/CSC_KEY_PASSWORD secrets when a
          # Developer ID cert exists.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - run: node packages/app/scripts/sign-release.mjs packages/app/release/*.zip
        # `secrets` isn't an allowed context in `if:` (GitHub Actions restricts it to
        # env/with/run) — route it through `env` first, which `if:` can read.
        if: ${{ env.UPDATE_ED_PRIVATE_KEY != '' }}
        env:
          UPDATE_ED_PRIVATE_KEY: ${{ secrets.UPDATE_ED_PRIVATE_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: bean-mac
          path: |
            packages/app/release/*.dmg
            packages/app/release/*.zip
            packages/app/release/*.zip.sig
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=(packages/app/release/*.dmg packages/app/release/*.zip packages/app/release/*.zip.sig)

          # GitHub's API intermittently returns 5xx (v0.20.0/v0.20.1 both died here
          # on a transient HTTP 503 after a fully successful build). Retry with
          # backoff so a blip doesn't discard an otherwise-complete release, and stay
          # idempotent: if a prior attempt already made the release, upload into it.
          attempt=1
          max=5
          until [ "$attempt" -gt "$max" ]; do
            if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
              gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber && exit 0
            else
              gh release create "${GITHUB_REF_NAME}" "${assets[@]}" --generate-notes && exit 0
            fi
            echo "Attach-to-release attempt ${attempt}/${max} failed; retrying in $((attempt * 10))s..." >&2
            sleep "$((attempt * 10))"
            attempt=$((attempt + 1))
          done
          echo "::error::Failed to attach release ${GITHUB_REF_NAME} after ${max} attempts" >&2
          exit 1
